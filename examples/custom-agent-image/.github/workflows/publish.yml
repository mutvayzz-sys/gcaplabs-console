name: Publish image

# REFERENCE WORKFLOW — inert here. GitHub only runs workflows from a repo's ROOT
# .github/workflows/, so this copy (inside an example subfolder) never fires. To use
# it, copy this example folder into its own repo so this file lands at that repo's root.
#
# Runs on every push to main and whenever you click "Run workflow". It does NOT
# run on pull requests. It builds your image and pushes it to YOUR GitHub Container
# Registry (ghcr.io/<you>/<repo>) using the built-in GITHUB_TOKEN — no secrets to set up.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write # lets the auto-issued token push to GHCR

jobs:
  publish:
    runs-on: ubuntu-latest # GitHub's amd64 runner — builds the right arch for Agent37
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name (GHCR requires lowercase)
        id: img
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          # Pin the immutable :sha tag when you register the template, not :latest.
          tags: |
            ${{ steps.img.outputs.ref }}:latest
            ${{ steps.img.outputs.ref }}:${{ github.sha }}

      - name: Where to find it
        run: |
          echo "Published ${{ steps.img.outputs.ref }}:${{ github.sha }}"
          echo "First publish? Make the package PUBLIC: repo → Packages → Package settings → Change visibility → Public"
